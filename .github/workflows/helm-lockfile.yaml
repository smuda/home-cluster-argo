name: Update Helm lockfiles

# When a PR changes a chart's Chart.yaml (e.g. a Dependabot version bump),
# regenerate that chart's Chart.lock and commit it back to the PR branch.
# Argo CD renders from the committed lock, and CI's `helm dependency build`
# fails on a stale lock, so keeping the lock in sync is required on every bump.

on:
  pull_request:
    paths:
      - "**/Chart.yaml"

permissions:
  contents: write

jobs:
  update-locks:
    runs-on: ubuntu-latest
    # Only same-repo branches (Dependabot, maintainers) can be pushed to.
    # Fork PRs run read-only; their lock is regenerated by the maintainer.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.16.0

      - name: Regenerate Chart.lock for changed charts
        env:
          # Hosts trusted to serve upstream charts. A PR pointing a Chart.yaml
          # dependency at any other host fails here, before anything is fetched
          # with the write-scoped token present in the environment.
          ALLOWED_HOSTS: >-
            charts.jetstack.io aquasecurity.github.io argoproj.github.io
            bitnami.github.io kubecost.github.io kubernetes-sigs.github.io
            kubernetes.github.io prometheus-community.github.io
            raw.githubusercontent.com stakater.github.io
            victoriametrics.github.io registry.k8s.io
        run: |
          set -euo pipefail
          mapfile -t changed < <(git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" -- '**/Chart.yaml')
          [ ${#changed[@]} -eq 0 ] && { echo "no Chart.yaml changes"; exit 0; }
          for cy in "${changed[@]}"; do
            [ -f "$cy" ] || continue
            grep -q '^dependencies:' "$cy" || continue
            dir=$(dirname "$cy")
            echo "::group::$dir"
            grep -hoE 'repository:[[:space:]]*(https?|oci)://[^[:space:]]+' "$cy" \
              | sed -E 's#repository:[[:space:]]*##' | sort -u > /tmp/urls
            # reject any dependency host outside the allowlist
            while read -r url; do
              [ -z "$url" ] && continue
              host=$(printf '%s' "$url" | sed -E 's#^[a-z]+://([^/]+).*#\1#')
              case " $ALLOWED_HOSTS " in
                *" $host "*) ;;
                *) echo "::error file=$cy::disallowed repository host: $host"; exit 1 ;;
              esac
            done < /tmp/urls
            # register the https repos (oci dependencies need no `helm repo add`)
            grep -E '^https?://' /tmp/urls \
              | while read -r url; do
                  helm repo add "repo-$(printf '%s' "$url" | shasum | cut -c1-8)" "$url" \
                    >/dev/null 2>&1 || true
                done
            helm dependency update "$dir"
            echo "::endgroup::"
          done

      # Pushes Chart.lock back to the PR branch with the default GITHUB_TOKEN.
      # Do NOT swap in a PAT here: the default token deliberately does not
      # re-trigger workflows, which is what prevents a commit/CI loop.
      - name: Commit regenerated lockfiles
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "build(deps): regenerate Chart.lock"
          file_pattern: "**/Chart.lock"
