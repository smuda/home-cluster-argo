upstream:
  nameOverride: kube-prometheus-stack

  grafana:
    enabled: false
  nodeExporter:
    enabled: false

  prometheus:
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - prometheus.apps.k8s1.example.com
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false
      # Discover PrometheusRules cluster-wide rather than only those carrying
      # the chart's release label (the kube-prometheus-stack default). Matches
      # the serviceMonitor behavior above, so addon rules need no extra labels.
      ruleSelectorNilUsesHelmValues: false

  alertmanager:
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - alert-manager.apps.k8s1.example.com

  kube-state-metrics:
    metricLabelsAllowlist:
      - pods=[gitlab_project,gitlab_project_id,gitlab_namespace]
