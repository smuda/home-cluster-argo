upstream:
  fullnameOverride: trivy-operator

  operator:
    metricsVulnIdEnabled: true
    scanJobsConcurrentLimit: 3 # Limit to three concurrent jobs. Default is 10.
    # Run a built-in Trivy server (ClientServer mode). The server owns the
    # vuln DB and cache, so scan job containers no longer contend for a shared
    # local fs cache lock (the cause of failing scan pods in Standalone mode).
    builtInTrivyServer: true

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  resources:
    requests:
      cpu: 10m
      memory: 1024Mi
    limits:
      cpu: 2
      memory: 3072Mi

  serviceMonitor:
    enabled: true

  trivy:
    ignoreUnfixed: true
    # -- resources resource requests and limits for scan job containers
    resources:
      requests:
        cpu: 100m
        memory: 300Mi
        # ephemeralStorage: "2Gi"
      limits:
        cpu: 500m
        memory: 1000Mi
        # ephemeralStorage: "2Gi"

  trivyOperator:
    scanJobPodTemplatePodSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
