# Bind the trivy-operator SA to the privileged SCC so the CIS node-collector
# Job can run. OpenShift only; the value files for OKD/OCP set this true.
createSccBinding: false

upstream:
  fullnameOverride: trivy-operator

  operator:
    metricsVulnIdEnabled: true
    scanJobsConcurrentLimit: 3 # Limit to three concurrent jobs. Default is 10.
    # Run a built-in Trivy server (ClientServer mode). The server owns the
    # vuln DB and cache, so scan job containers no longer contend for a shared
    # local fs cache lock (the cause of failing scan pods in Standalone mode).
    builtInTrivyServer: true

  # The CIS node-collector scans every node, including control-plane nodes (it
  # mounts /var/lib/etcd, kube-scheduler and kube-controller-manager paths).
  # Control-plane nodes carry the node-role taint, so without matching
  # tolerations the per-node Jobs hang Pending and get recreated, flooding
  # kube-controller-manager with Job StorageError races.
  nodeCollector:
    tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  resources:
    requests:
      cpu: 10m
      memory: 1024Mi
    limits:
      cpu: 2
      memory: 3072Mi

  serviceMonitor:
    enabled: true

  trivy:
    ignoreUnfixed: true
    # -- resources resource requests and limits for scan job containers
    resources:
      requests:
        cpu: 100m
        memory: 300Mi
        # ephemeralStorage: "2Gi"
      limits:
        cpu: 500m
        memory: 1000Mi
        # ephemeralStorage: "2Gi"

  trivyOperator:
    scanJobPodTemplatePodSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
