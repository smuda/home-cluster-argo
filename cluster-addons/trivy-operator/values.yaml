# Bind the trivy-operator SA to the privileged SCC so the CIS node-collector
# Job can run. OpenShift only; the value files for OKD/OCP set this true.
createSccBinding: false

upstream:
  fullnameOverride: trivy-operator

  operator:
    metricsVulnIdEnabled: true
    scanJobsConcurrentLimit: 3 # Limit to three concurrent jobs. Default is 10.
    # Run a built-in Trivy server (ClientServer mode). The server owns the
    # vuln DB and cache, so scan job containers no longer contend for a shared
    # local fs cache lock (the cause of failing scan pods in Standalone mode).
    builtInTrivyServer: true

    # Auto-restart the operator when its `trivy-operator` config ConfigMap
    # changes, so values edits (e.g. scanJob securityContext) take effect on
    # Argo sync without a manual `oc rollout restart`. The operator reads that
    # CM via the API and caches it at startup, and does NOT mount it — so the
    # `reloader.stakater.com/auto` annotation (mounted CMs only) would miss it;
    # the explicit name-based reload annotation is required. Inert on clusters
    # without the reloader addon. These deployment annotations land on the
    # operator Deployment's metadata, which is where Reloader reads them.
    annotations:
      configmap.reloader.stakater.com/reload: trivy-operator

  # The CIS node-collector scans every node, including control-plane nodes (it
  # mounts /var/lib/etcd, kube-scheduler and kube-controller-manager paths).
  # Control-plane nodes carry the node-role taint, so without matching
  # tolerations the per-node Jobs hang Pending and get recreated, flooding
  # kube-controller-manager with Job StorageError races.
  nodeCollector:
    tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  resources:
    requests:
      cpu: 10m
      memory: 1024Mi
    limits:
      cpu: 2
      memory: 3072Mi

  serviceMonitor:
    enabled: true

  trivy:
    ignoreUnfixed: true
    # -- resources resource requests and limits for scan job containers
    resources:
      requests:
        cpu: 100m
        memory: 300Mi
        # ephemeralStorage: "2Gi"
      limits:
        cpu: 500m
        memory: 1000Mi
        # ephemeralStorage: "2Gi"

  trivyOperator:
    scanJobPodTemplatePodSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
