{{ if and .Values.certManager.use (eq .Values.certManager.static false) }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dex-issuer
spec:
  duration: 87600h # 3650d ~ 10y
  isCA: true
  commonName: dexter-ca
  subject:
    organizations:
      - home lab
  secretName: root-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: dex-issuer
spec:
  ca:
    secretName: root-secret
{{ end }}
