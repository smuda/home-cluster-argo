{{ if .Values.opendatahubOperator.use }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: okd-open-data-hub-operator
  namespace: {{ .Values.argo.common.apps_namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
{{- if .Values.argo.common.finalizers }}
  finalizers: {{ .Values.argo.common.finalizers | toYaml | nindent 4 }}
{{- end }}
spec:
  destination:
    namespace: {{ .Values.opendatahubOperator.namespace }}
    server: https://kubernetes.default.svc
  project: {{ .Values.argo.project }}
  source:
    helm:
      version: v3
      releaseName: odh-operator
      {{- if .Values.argo.common.valueFiles }}
      valueFiles:
        {{- .Values.argo.common.valueFiles | toYaml | nindent 8 }}
        {{ with .Values.argo.common.additionalValueFiles }}
        {{ . | toYaml | nindent 8 }}
        {{ end }}
      {{- end }}
    path: okd/open-data-hub-operator/
    repoURL: https://github.com/smuda/home-cluster-argo.git
    targetRevision: {{ .Values.argo.common.target_revision }}
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
    {{- if .Values.argo.common.enableLabelManagement }}
    managedNamespaceMetadata:
      labels: # The labels to set on the application namespace
        # Disable OpenShift SCC label-sync so the PodSecurity levels below
        # are authoritative and not recomputed (to "restricted") by the
        # cluster, which would block the ODH operator controller-manager.
        security.openshift.io/scc.podSecurityLabelSync: "false"
        pod-security.kubernetes.io/audit: {{ .Values.opendatahubOperator.podSecurityLevel }}
        pod-security.kubernetes.io/enforce: {{ .Values.opendatahubOperator.podSecurityLevel }}
        pod-security.kubernetes.io/warn: {{ .Values.opendatahubOperator.podSecurityLevel }}
    {{- end }}
{{ end }}
