argo:
  project: okd
  common:
    valueFiles: []
    target_revision: main
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    apps_namespace: argocd
    enableLabelManagement: true

catalogSources:
  use: true
certManager:
  use: false
complianceOperator:
  use: true
  podSecurityLevel: privileged
csrAutoApprover:
  use: true
garbageCollector:
  use: false
  podSecurityLevel: privileged
keda:
  use: true
  namespace: openshift-keda
  podSecurityLevel: restricted
machineConfigs:
  use: true
  podSecurityLevel: restricted
opendatahubOperator:
  use: true
  namespace: openshift-open-data-hub-operators
  # ODH community operator v1.5.0 controller-manager does not set
  # seccompProfile, so it cannot run under PodSecurity "restricted".
  # Run the operator namespace as privileged (see managedNamespaceMetadata
  # in templates/open-data-hub-operator.yaml, which also disables the
  # OpenShift scc label-sync so this level is not overwritten).
  podSecurityLevel: privileged
openshiftGitOpsOperator:
  use: true
openshiftLogging:
  use: true
  namespace: openshift-logging
  # The OpenShift Logging operator deploys a Vector collector DaemonSet that
  # mounts node log paths (hostPath), which PodSecurity "restricted"/"baseline"
  # forbid; run the namespace privileged.
  podSecurityLevel: privileged
openshiftVerticalPodAutoscaler:
  use: true
  podSecurityLevel: restricted
patchOperator:
  use: true
  podSecurityLevel: restricted
