{{- if .Values.system.psi.enabled -}}
{{- range $mcpName := .Values.machineConfigPools }}
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: {{ $mcpName }}
  name: "99-kargs-psi-{{ $mcpName }}"
spec:
  config:
    ignition:
      version: 3.2.0
  kernelArguments:
    # Enable Pressure Stall Information (CONFIG_PSI). Exposes
    # CPU/memory/IO pressure metrics under /proc/pressure and per-cgroup.
    - psi=1
---
{{- end -}}
{{- end -}}
