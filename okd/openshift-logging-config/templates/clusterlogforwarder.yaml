{{- if .Capabilities.APIVersions.Has "observability.openshift.io/v1" -}}
{{- $ep := .Values.victoriaLogs.endpoint -}}
# Forwards application/infrastructure/audit logs to the in-cluster VictoriaLogs
# store via its Elasticsearch bulk endpoint. URL query params map OpenShift log
# fields onto VictoriaLogs stream/time/message fields. The operator renders this
# as a Vector collector DaemonSet. Gated on the Logging 6.x CRD so it only
# applies once the operator is installed.
# https://docs.victoriametrics.com/guides/collecting-openshift-logs-with-victoria-logs/
apiVersion: observability.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: logging
  namespace: "{{ .Release.Namespace }}"
spec:
  managementState: Managed
  serviceAccount:
    name: victorialogs
  outputs:
    - name: victorialogs
      type: elasticsearch
      elasticsearch:
        index: logs
        version: 8
        url: "{{ $ep }}/insert/elasticsearch/_bulk?_stream_fields=log_type,hostname,stream,kubernetes.pod_name,kubernetes.container_name,kubernetes.pod_namespace&_time_field=@timestamp&_msg_field=message,msg,_msg,log.msg,log.message,log&fake_field=1"
        tuning:
          compression: gzip
    - name: victorialogs-infrastructure
      type: elasticsearch
      elasticsearch:
        index: logs
        version: 8
        url: "{{ $ep }}/insert/elasticsearch/_bulk?_stream_fields=log_type,hostname,tag,systemd.t.EXE,level&_time_field=@timestamp&_msg_field=message,msg,_msg,log.msg,log.message,log&fake_field=1"
        tuning:
          compression: gzip
    - name: victorialogs-audit
      type: elasticsearch
      elasticsearch:
        index: logs
        version: 8
        url: "{{ $ep }}/insert/elasticsearch/_bulk?_stream_fields=log_type,hostname,annotations.authorization.k8s.io/decision,verb&_time_field=@timestamp&_msg_field=annotations.authorization.k8s.io/reason&fake_field=1"
        tuning:
          compression: gzip
  pipelines:
    - name: application
      inputRefs:
        - application
      outputRefs:
        - victorialogs
    - name: infrastructure
      inputRefs:
        - infrastructure
      outputRefs:
        - victorialogs-infrastructure
    - name: audit
      inputRefs:
        - audit
      outputRefs:
        - victorialogs-audit
{{- end }}
